name: evolix-prod

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: Release
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      RefreshToken__LifetimeDays: ${REFRESH_TOKEN_LIFETIME_DAYS}
      AppleSettings__ClientId: ${APPLE_CLIENT_ID}
      Cors__Origins__0: ${CORS_ORIGIN_0}
      Cors__Origins__1: ${CORS_ORIGIN_1}
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_HOST_PORT:-8080}:8080"
