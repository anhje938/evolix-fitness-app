services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evolix_dev}
      POSTGRES_USER: ${POSTGRES_USER:-evolix_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-dev-password}
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-evolix_dev};Username=${POSTGRES_USER:-evolix_app};Password=${POSTGRES_PASSWORD:-change-this-dev-password};Include Error Detail=true
      Jwt__Issuer: ${JWT_ISSUER:-evolix-api-dev}
      Jwt__Audience: ${JWT_AUDIENCE:-evolix-client-dev}
      Jwt__SecretKey: ${JWT_SECRET_KEY:-replace-with-a-long-random-dev-secret-key}
      RefreshToken__LifetimeDays: ${REFRESH_TOKEN_LIFETIME_DAYS:-250}
      AppleSettings__ClientId: ${APPLE_CLIENT_ID:-no.evolix.app}
      RevenueCat__SecretApiKey: ${REVENUECAT_SECRET_API_KEY:-}
      RevenueCat__PremiumEntitlementId: ${REVENUECAT_PREMIUM_ENTITLEMENT_ID:-premium}
      Cors__Origins__0: http://localhost:19006
      Cors__Origins__1: http://localhost:3000
      Cors__Origins__2: http://localhost:5173
    ports:
      - "${API_HOST_PORT:-8080}:8080"

volumes:
  postgres-data:
